# ─────────────────────────────────────────────────────────────────────────────
#  Render Blueprint — deploys the WHOLE app as ONE web service.
#
#  The Express/Socket.IO backend serves the built React SPA from frontend/dist
#  (see backend/src/index.js, NODE_ENV=production branch), so the API, the
#  realtime/WebRTC-signaling layer, and the UI all live on a single HTTPS origin
#  (HTTPS is required for camera/microphone access in voice/video calls).
#
#  First deploy:
#    1. Push this repo to GitHub.
#    2. Render Dashboard → New → Blueprint → pick this repo.
#    3. Fill in the env vars marked `sync: false`, then Apply.
#         • REQUIRED: MONGODB_URI, CLERK_PUBLISHABLE_KEY, VITE_CLERK_PUBLISHABLE_KEY
#         • OPTIONAL: CLERK_SECRET_KEY, CLOUDINARY_*, VITE_TURN_* (leave blank to skip)
#       (You can also bulk-paste them from render-upload.env via the dashboard's
#        "Add from .env" button.)
#
#  Render injects PORT and RENDER_EXTERNAL_URL automatically — the app already
#  reads both, so CORS/Socket.IO origins are configured with no extra steps.
# ─────────────────────────────────────────────────────────────────────────────
services:
  - type: web
    name: chat-app
    runtime: node
    plan: free          # bump to "starter" to avoid free-tier cold-starts/sleep
    region: oregon      # pick the region closest to your users
    branch: main
    autoDeploy: true
    # `npm run build` installs root + backend + frontend deps, then builds the
    # SPA into frontend/dist. Vite reads the VITE_* vars below from the build env.
    buildCommand: npm run build
    # `npm start` runs `node backend/src/index.js`, which serves the SPA + API.
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # ── Core (non-secret, set automatically) ──────────────────────────────
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: LOG_LEVEL
        value: info
      - key: GUEST_RETENTION_DAYS
        value: "30"

      # ── Frontend build-time config (same-origin) ──────────────────────────
      - key: VITE_APP_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: VITE_SOCKET_URL
        value: /

      # ── Generated secret ──────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true            # Render generates a strong random value

      # ── REQUIRED secrets — set in the dashboard (or via render-upload.env) ──
      - key: MONGODB_URI
        sync: false                    # MongoDB Atlas connection string (free M0)
      - key: CLERK_PUBLISHABLE_KEY
        sync: false                    # pk_test_… or pk_live_… (Clerk dashboard)
      - key: VITE_CLERK_PUBLISHABLE_KEY # the SAME pk_… value (baked into the SPA)
        sync: false

      # ── OPTIONAL — leave blank to skip the feature ────────────────────────
      # Clerk Backend API calls (NOT needed for session verification):
      - key: CLERK_SECRET_KEY
        sync: false
      # Image/avatar uploads. If unset, the app boots fine and runs text-only
      # (image upload is disabled); set all three to enable image sharing:
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Voice/video TURN relay — needed for calls ACROSS different networks
      # (mobile data, strict NATs). Free 1 TB/mo at https://www.expressturn.com:
      # paste its Username/Password here (the relay URLs default to ExpressTURN).
      # Leave blank for same-network-only calls. See DEPLOYMENT.md → Voice/video.
      - key: VITE_TURN_USERNAME
        sync: false
      - key: VITE_TURN_CREDENTIAL
        sync: false
      # Optional: override the default ExpressTURN relay URLs (comma-separated)
      # with your own TURN server(s):
      - key: VITE_TURN_URL
        sync: false
